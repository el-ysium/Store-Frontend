<app-navbar [cartCount]="cart.length" (onSearch)="handleSearch($event)">
</app-navbar>
<main>
  <div class="product-grid">
    @for (p of filteredProducts; track p.id) {
    <app-product-card [product]="p" [isSelected]="isProductInCart(p)" (productSelected)="toggleCart($event)">
    </app-product-card>
    } @empty {
    <p>No products found.</p>
    }
  </div>
</main>
