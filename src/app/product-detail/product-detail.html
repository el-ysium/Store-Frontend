
@if (product) {
  <div class=" grid grid-cols-1 md:grid-cols-2 gap-10 mx-auto">
    <img [src]="imageUrl" class="rounded-lg shadow-md">
    
    <div>
      <span class="text-blue-500 uppercase font-medium text-sm">{{ categoryName }}</span>
      <h1 class="text-4xl font-medium my-4">{{ product.name }}</h1>
      <p class="text-neutral-600 mb-6">{{ product.description }}</p>
      <p class="text-xl font-medium text-neutral-800 mb-6">₦{{ product.price }}</p>

      @if (productService.isInCart(product.id)) {
        <button (click)="productService.removeFromCart(product.id)" 
                class="bg-slate-500 hover:bg-slate-600 text-white px-6 py-3 rounded-full">
          Remove from Cart
        </button>
      } @else {
        <button (click)="productService.addToCart(product)" 
                class="bg-purple-100/70 text-purple-600 px-6 py-3 rounded-full hover:bg-purple-200">
          Add to Cart
        </button>
      }
    </div>
  </div>
} @else {
  <p class="text-center py-20">Loading product details...</p>
}
